<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Little Sprouts CRM</title>
<style>
:root{
  --bg:#F2F4EE;
  --ink:#1E2A26;
  --ink-soft:#4B5A55;
  --teal:#1F6F64;
  --teal-dark:#164F47;
  --mango:#E8A23D;
  --coral:#DD5B4B;
  --card:#FFFFFF;
  --sage:#E8ECE3;
  --line:#D9DED3;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:var(--teal-dark);
  color:#EAF2EF;
  padding:24px 16px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.brand{
  font-family:'Fraunces',serif;
  font-size:20px;
  font-weight:700;
  color:#fff;
  margin-bottom:2px;
  display:flex;
  align-items:center;
  gap:8px;
}
.brand-sub{
  font-size:11px;
  color:#9FC9C0;
  margin-bottom:24px;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  color:#CFE3DE;
  transition:background .15s;
}
.nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.active{background:var(--teal);color:#fff;font-weight:600;}
.nav-icon{width:16px;text-align:center;}
.sidebar-foot{margin-top:auto;font-size:11px;color:#7EA69C;line-height:1.5;}

/* MAIN */
.main{flex:1;padding:28px 36px;min-width:0;}
.topbar{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.page-title{font-size:26px;font-weight:700;margin:0 0 4px 0;}
.page-sub{color:var(--ink-soft);font-size:14px;margin:0;}

.role-switch{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;display:flex;align-items:center;gap:10px;font-size:13px;
}
.role-switch select{
  border:none;background:var(--sage);border-radius:6px;padding:5px 8px;font-size:13px;font-family:inherit;color:var(--ink);
}

/* CARDS / GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.stat-num{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--teal-dark);}
.stat-label{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:18px;}
.card h3{margin:0 0 12px 0;font-size:16px;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
input,select,textarea{
  font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;}
button{
  font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;
  background:var(--teal);color:#fff;transition:background .15s;
}
button:hover{background:var(--teal-dark);}
button.secondary{background:var(--sage);color:var(--ink);}
button.secondary:hover{background:var(--line);}
button.danger{background:var(--coral);}
button.wa{background:#2FAE60;}
button.wa:hover{background:#25914F;}
button:disabled{opacity:.45;cursor:not-allowed;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;color:var(--ink-soft);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);}
td{padding:10px 10px;border-bottom:1px solid var(--sage);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFBF8;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-seedling{background:#EAF6EE;color:#2B8A4C;}
.badge-sprout{background:#EAF3F1;color:var(--teal);}
.badge-sapling{background:#FCF1DD;color:#B5761F;}
.badge-bloom{background:#FBE9E6;color:var(--coral);}
.badge-paid{background:#EAF6EE;color:#2B8A4C;}
.badge-pending{background:#FCF1DD;color:#B5761F;}
.badge-overdue{background:#FBE9E6;color:var(--coral);}

.growth-icon{display:inline-block;width:14px;height:14px;vertical-align:-2px;}

.modal-backdrop{
  position:fixed;inset:0;background:rgba(20,30,28,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{margin-top:0;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field-row label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em;}
.field-row input,.field-row select{width:100%;}
.full-row{margin-bottom:10px;}
.full-row label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em;}
.full-row input,.full-row select,.full-row textarea{width:100%;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.empty-state .display{font-size:18px;color:var(--ink);margin-bottom:6px;}

.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:6px 12px;border-radius:20px;background:var(--sage);font-size:12px;cursor:pointer;border:1px solid transparent;}
.pill.active{background:var(--teal);color:#fff;}

.log-item{border-left:3px solid var(--teal);padding:8px 12px;margin-bottom:8px;background:var(--sage);border-radius:0 8px 8px 0;font-size:13px;}
.log-meta{font-size:11px;color:var(--ink-soft);margin-top:3px;}

.child-detail-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;}
@media (max-width:800px){.child-detail-grid{grid-template-columns:1fr;} .app{flex-direction:column;} .sidebar{width:100%;flex-direction:row;overflow-x:auto;} .sidebar-foot{display:none;}}

.loading{padding:60px;text-align:center;color:var(--ink-soft);}

#receiptPrintArea{display:none;}
.receipt-box{border:1px solid var(--line);border-radius:10px;padding:20px;}
.receipt-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--teal);padding-bottom:12px;margin-bottom:12px;}
.receipt-brand{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--teal-dark);}
.receipt-meta{text-align:right;font-size:12px;color:var(--ink-soft);}
.receipt-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.receipt-total{display:flex;justify-content:space-between;padding-top:12px;font-size:16px;font-weight:700;color:var(--teal-dark);}
.receipt-stamp{display:inline-block;margin-top:14px;padding:4px 12px;border:2px solid #2B8A4C;color:#2B8A4C;border-radius:6px;font-weight:700;font-size:12px;letter-spacing:.05em;transform:rotate(-3deg);}

@media print{
  body *{visibility:hidden;}
  #receiptPrintArea, #receiptPrintArea *{visibility:visible;}
  #receiptPrintArea{display:block;position:absolute;top:0;left:0;width:100%;padding:30px;}
}
</style>
</head>
<body>
<div id="root" class="loading">Loading Little Sprouts CRM…</div>
<div id="receiptPrintArea"></div>

<script>

    ta: (parentFirst, child, desc) => `வணக்கம் ${parentFirst}, இது Little Sprouts பாலர் பள்ளியிலிருந்து. இன்று ${child}க்கு ஒரு சிறிய விபத்து ஏற்பட்டது: ${desc}. உடனடியாக உங்களுக்குத் தெரிவிக்க விரும்பினோம் — ஏதேனும் கேள்விகள் இருந்தால் தொடர்பு கொள்ளுங்கள்.`
  },

    ta: (parentFirst, child, desc) => `வணக்கம் ${parentFirst}, இது Little Sprouts பாலர் பள்ளியிலிருந்து. இன்று ${child} உடல்நிலை சரியில்லாமல் இருப்பதை கவனித்தோம்: ${desc}. முன்கூட்டியே அழைத்துச் செல்ல விரும்பினால் அல்லது எங்களுக்கு ஏதேனும் வழிகாட்டுதல் இருந்தால் தெரியப்படுத்துங்கள்.`

  other: {
    en: (parentFirst, child, desc) => `Hi ${parentFirst}, this is Little Sprouts Nursery. A quick note about ${child}: ${desc}.`,
    si: (parentFirst, child, desc) => `ආයුබෝවන් ${parentFirst}, මේ Little Sprouts පෙර පාසලෙන්. ${child} ගැන කුඩා සටහනක්: ${desc}.`,

const MSG_TEMPLATES = {
  renewal: {
    en: (parentFirst, child) => `Hi ${parentFirst}, this is Little Sprouts Nursery. A quick reminder that ${child}'s term fee is currently pending. Let us know if you'd like to arrange payment or have any questions. Thank you!`,

    ta: (parentFirst, child) => `வணக்கம் ${parentFirst}, இது Little Sprouts பாலர் பள்ளியிலிருந்து. ${child} இன் இந்த காலாண்டு கட்டணம் இன்னும் செலுத்தப்படவில்லை என்பதை நினைவூட்ட விரும்புகிறோம். கட்டண ஏற்பாடு அல்லது ஏதேனும் கேள்விகள் இருந்தால் தெரியப்படுத்துங்கள். நன்றி!`

    ta: (parentFirst) => `வணக்கம் ${parentFirst}, இது Little Sprouts பாலர் பள்ளியிலிருந்து. உங்கள் இளைய குழந்தையை எங்களுடன் சேர்க்க ஆர்வமாக இருக்கிறீர்களா என்பதை அறிய விரும்புகிறோம். தற்போதைய இடங்கள் மற்றும் பரிந்துரை தள்ளுபடி பற்றிய விவரங்களை மகிழ்ச்சியுடன் பகிர்வோம்!`
  }
};

const CLASSES = ['Seedlings (1-2y)','Sprouts (2-3y)','Saplings (3-4y)','Bloomers (4-5y)'];
const STAGE_ORDER = ['seedling','sprout','sapling','bloom'];
const STAGE_LABEL = {seedling:'Seedling',sprout:'Sprout',sapling:'Sapling',bloom:'Bloom'};

function leafIcon(color){
  return `<svg class="growth-icon" viewBox="0 0 24 24" fill="none"><path d="M4 20C4 20 3 10 12 5C21 10 20 20 20 20C20 20 12 20 4 20Z" fill="${color}" opacity="0.9"/><path d="M12 20V9" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/></svg>`;
}
function stageBadge(stage){
  const colors={seedling:'#2B8A4C',sprout:'#1F6F64',sapling:'#B5761F',bloom:'#DD5B4B'};
  return `<span class="badge badge-${stage}">${leafIcon(colors[stage]||'#2B8A4C')}${STAGE_LABEL[stage]||stage}</span>`;
}
function feeBadge(status){
  return `<span class="badge badge-${status}">${status.charAt(0).toUpperCase()+status.slice(1)}</span>`;
}
function severityColor(sev){
  return {note:'#1F6F64', concern:'#B5761F', urgent:'#DD5B4B'}[sev] || '#1F6F64';
}
function uid(prefix){return prefix+'_'+Math.random().toString(36).slice(2,9);}
function esc(s){return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function daysUntil(dateStr){
  const now=new Date(); now.setHours(0,0,0,0);
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
function nextBirthday(dob){
  const d=new Date(dob); const now=new Date();
  let next=new Date(now.getFullYear(),d.getMonth(),d.getDate());
  if(next<now){ next=new Date(now.getFullYear()+1,d.getMonth(),d.getDate()); }
  return next;
}

// ---------- STORAGE (real backend via REST API, shared by all devices) ----------
async function loadData(){
  try{
    const res = await fetch('/api/state');
    if(res.status===401){ USER=null; renderLogin(); return; }
    if(!res.ok) throw new Error('bad response');
    DATA = await res.json();
  }catch(e){
    console.error('Failed to load state from server', e);
    document.getElementById('root').innerHTML = '<div class="loading">Could not reach the server. Please refresh, or check that the backend is running.</div>';
    return;
  }
  render();
}
async function apiPost(url, body){
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body||{})
  });
  if(res.status===401){ USER=null; renderLogin('Your session expired. Please sign in again.'); throw new Error('Not authenticated'); }
  if(!res.ok){
    const err = await res.json().catch(()=>({error:'Unknown error'}));
    alert('Something went wrong: ' + (err.error || res.statusText));
    throw new Error(err.error || 'Request failed');
  }
  DATA = await res.json();
  render();
}
async function resetData(){
  if(!confirm('This will erase all CRM data on the server (shared by everyone using this app) and restore sample data. Continue?')) return;
  try{ await apiPost('/api/reset'); }catch(e){}
}

// ---------- DERIVED ----------
function parentName(id){ const p=DATA.parents.find(x=>x.id===id); return p?p.name:'Unknown'; }
function childrenForClass(cls){ return DATA.children.filter(c=>c.classId===cls); }
function visibleChildren(){
  if(ROLE==='teacher' && TEACHER_CLASS){ return DATA.children.filter(c=>c.classId===TEACHER_CLASS); }
  return DATA.children;
}
function feeStatusFor(child){
  if(child.fees.some(f=>f.status==='overdue')) return 'overdue';
  if(child.fees.some(f=>f.status==='pending')) return 'pending';
  return 'paid';
}

function renderLogin(errorMsg){
  document.getElementById('root').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);">
      <div class="card" style="width:100%;max-width:340px;">

async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  try{
    const res = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({error:'Login failed'}));
      renderLogin(err.error || 'Login failed');
      return;
    }
    USER = await res.json();
    ROLE = USER.role;
    TEACHER_CLASS = USER.classId;
    loadData();
  }catch(e){
    renderLogin('Could not reach the server. Please try again.');
  }
}

function getMarketingCandidates(type){
  const out = [];
  DATA.children.forEach(c=>{
    if(type==='renewal'){
      c.fees.forEach(f=>{
        if(f.status==='pending' || f.status==='overdue'){
          const d = daysUntil(f.dueDate);
          out.push({child:c, reason:`${f.term} fee ${f.status==='overdue'?'overdue':'pending'}`, when: d<0?`${Math.abs(d)}d overdue`:`due in ${d}d`, priority: d});
        }
      });
    } else if(type==='birthday'){
      const nb = nextBirthday(c.dob);
      const d = daysUntil(nb.toISOString().slice(0,10));
      if(d<=30){
        out.push({child:c, reason:'Upcoming birthday', when:`in ${d}d`, priority:d});
      }
    } else if(type==='sibling'){
      // parents with only one enrolled child could have younger siblings - heuristic: notes mention "younger" or "sibling"
      c.parentIds.forEach(pid=>{
        const p = DATA.parents.find(x=>x.id===pid);
        if(p && /younger|sibling|future/i.test(p.notes||'')){
          out.push({child:c, reason:`Parent note suggests a sibling opportunity (${p.name})`, when:'—', priority:0});
        }
      });
    }
  });
  return out.sort((a,b)=>a.priority-b.priority);
}

function buildWaMessage(type, child, parent, lang){
  const parentFirst = parent ? parent.name.split(' ')[0] : 'there';
  const l = lang || MKT_LANG;
  const tmpl = MSG_TEMPLATES[type][l] || MSG_TEMPLATES[type].en;
  return tmpl(parentFirst, child.name);
}

}

          ${i.sentToParent ? '<span class="log-meta">✓ Sent to parent</span>' : `<button class="secondary" style="padding:3px 10px;font-size:11px;" onclick="notifyIncident('${c.id}','${i.id}')">Notify parent (WhatsApp)</button>`}

  <div class="child-detail-grid">

          </div>`;

      </div>
      ${ROLE==='admin' ? `
      <div class="card">
        <h3>Fees</h3>
        <table><thead><tr><th>Term</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>
        ${c.fees.map(f=>`<tr>
          <td>${esc(f.term)}</td><td class="mono">${f.amount.toLocaleString()}</td><td>${fmtDate(f.dueDate)}</td><td>${feeBadge(f.status)}</td>
          <td>${f.status!=='paid'?`<button class="secondary" onclick="markFeePaid('${c.id}','${f.id}')">Mark paid</button>`:`<button class="secondary" onclick="showReceipt('${c.id}','${f.id}')">Receipt</button>`}</td>
        </tr>`).join('')}
        </tbody></table>
      </div>
      <div class="card">
        <h3>Communication log</h3>
        ${(c.comms||[]).slice().reverse().map(m=>`<div class="log-item">${esc(m.note)}<div class="log-meta">${esc(m.channel)} · ${fmtDate(m.date)} · ${esc(m.staff)}</div></div>`).join('') || emptyState('No communication logged yet.')}
        <button class="secondary" style="margin-top:8px;" onclick="openCommModal('${c.id}')">+ Log communication</button>
      </div>` : ''}
    </div>
    <div>
      <div class="card">
        <h3>Attendance & teacher notes</h3>
        ${(c.attendance||[]).slice().reverse().map(a=>`<div class="log-item">${a.present?'Present':'Absent'}${a.note?` — ${esc(a.note)}`:''}<div class="log-meta">${fmtDate(a.date)}</div></div>`).join('') || emptyState('No attendance logged yet.')}

// ---------- ACTIONS ----------
async function markFeePaid(childId, feeId){
  try{
    await apiPost(`/api/fees/${feeId}/pay`);
    showReceipt(childId, feeId);
  }catch(e){}
}

function showReceipt(childId, feeId){
  const c = DATA.children.find(x=>x.id===childId);
  const f = c.fees.find(x=>x.id===feeId);
  const primaryParent = DATA.parents.find(p=>p.id===c.parentIds[0]);
  const receiptHtml = `
    <div class="receipt-box" id="receiptContent">
      <div class="receipt-head">
        <div>
          <div class="receipt-brand">🌱 Little Sprouts Nursery</div>
          <div class="log-meta">Payment Receipt</div>
        </div>
        <div class="receipt-meta">
          Receipt No: <strong>${esc(f.receiptNo || '—')}</strong><br>
          Date issued: ${fmtDate(f.paidDate)}
        </div>
      </div>
      <div class="receipt-row"><span>Received from</span><strong>${esc(primaryParent?primaryParent.name:'—')}</strong></div>
      <div class="receipt-row"><span>For child</span><strong>${esc(c.name)} (${esc(c.classId)})</strong></div>
      <div class="receipt-row"><span>Term</span><strong>${esc(f.term)}</strong></div>
      <div class="receipt-row"><span>Original due date</span><strong>${fmtDate(f.dueDate)}</strong></div>
      <div class="receipt-total"><span>Amount paid</span><span class="mono">LKR ${f.amount.toLocaleString()}</span></div>
      <div class="receipt-stamp">PAID</div>
    </div>
  `;
  showModal(`
    <h3>Receipt</h3>
    ${receiptHtml}
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Close</button>
      <button onclick="printReceipt()">Print / Save as PDF</button>
    </div>
  `);
  document.getElementById('receiptPrintArea').innerHTML = receiptHtml;
}
function printReceipt(){
  window.print();
}
async function cycleStage(childId){
  try{ await apiPost(`/api/children/${childId}/stage`); }catch(e){}
}
async function markAttendance(childId){
  const c = DATA.children.find(x=>x.id===childId);
  const today = todayStr();
  if((c.attendance||[]).some(a=>a.date===today)) { alert('Already marked present today.'); return; }
  try{ await apiPost(`/api/children/${childId}/attendance`, {}); }catch(e){}
}

function openIncidentModal(childId){
  showModal(`
    <h3>Report an incident</h3>
    <div class="field-row">
      <div><label>Type</label><select id="incType">
        <option value="injury">Injury / bump</option>
        <option value="illness">Possible illness</option>
        <option value="eating">Poor eating</option>
        <option value="other">Other note</option>
      </select></div>
      <div><label>Severity</label><select id="incSeverity">
        <option value="note">Just a note</option>
        <option value="concern">Concern — please be aware</option>
        <option value="urgent">Urgent — please call</option>
      </select></div>
    </div>
    <div class="full-row"><label>What happened</label><textarea id="incDesc" rows="3" placeholder="e.g. Bumped knee on the play slide, small graze, iced and comforted."></textarea></div>
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Cancel</button>
      <button class="danger" onclick="saveIncident('${childId}')">Save &amp; continue</button>
    </div>
  `);
}
async function saveIncident(childId){
  const type = document.getElementById('incType').value;
  const severity = document.getElementById('incSeverity').value;
  const description = document.getElementById('incDesc').value.trim();
  if(!description){ alert('Please describe what happened.'); return; }
  closeModal();
  try{
    const res = await fetch(`/api/children/${childId}/incidents`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({type, severity, description})
    });
    if(res.status===401){ USER=null; renderLogin('Your session expired. Please sign in again.'); return; }
    if(!res.ok){ const err = await res.json().catch(()=>({})); alert('Failed to save: '+(err.error||'unknown error')); return; }
    const result = await res.json();
    DATA = result;
    render();
    const newId = result.newIncidentId;
    if(newId) offerIncidentNotify(childId, newId, type, description);
  }catch(e){
    alert('Could not reach the server.');
  }
}
function offerIncidentNotify(childId, incidentId, type, description){
  const c = DATA.children.find(x=>x.id===childId);
  const primaryParent = DATA.parents.find(p=>p.id===c.parentIds[0]);
  if(!primaryParent) return;
  const lang = MKT_LANG || 'en';
  const tmpl = (INCIDENT_TEMPLATES[type] && INCIDENT_TEMPLATES[type][lang]) || INCIDENT_TEMPLATES[type].en;
  const parentFirst = primaryParent.name.split(' ')[0];
  const msg = tmpl(parentFirst, c.name, description);
  const waLink = `https://wa.me/${primaryParent.phone.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`;
  showModal(`
    <h3>Notify ${esc(primaryParent.name)}?</h3>
    <p class="log-meta">This incident is saved either way. Sending a WhatsApp message is optional but recommended.</p>
    <div class="log-item">${esc(msg)}</div>
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Not now</button>
      <a href="${waLink}" target="_blank" onclick="markIncidentSent('${incidentId}')"><button class="wa">Send on WhatsApp</button></a>
    </div>
  `);
}
async function markIncidentSent(incidentId){
  try{ await apiPost(`/api/incidents/${incidentId}/sent`); }catch(e){}
  closeModal();
}
async function notifyIncident(childId, incidentId){
  const c = DATA.children.find(x=>x.id===childId);
  const inc = (c.incidents||[]).find(i=>i.id===incidentId);
  if(!inc) return;
  offerIncidentNotify(childId, incidentId, inc.type, inc.description);
}

function openNoteModal(childId){
  showModal(`
    <h3>Add a note</h3>
    <div class="full-row"><label>Note</label><textarea id="noteText" rows="3" placeholder="e.g. Had a great day at the sensory table"></textarea></div>
    <div class="modal-actions">

async function saveNote(childId){

  if(!text) return;
  try{ await apiPost(`/api/children/${childId}/attendance`, {note:text}); }catch(e){}
}

function openCommModal(childId){
  showModal(`
    <h3>Log a communication</h3>
    <div class="field-row">
      <div><label>Channel</label><select id="commChannel"><option>WhatsApp</option><option>Phone call</option><option>Email</option><option>In person</option></select></div>

async function saveComm(childId){

let convertingProspectId = null;
function openAddChildModal(prefill){
  prefill = prefill || {};
  showModal(`
    <h3>Add child &amp; parent</h3>
    ${convertingProspectId ? `<p class="log-meta">Converting a lead — details below are pre-filled from their enquiry.</p>` : ''}
    <div class="field-row">
      <div><label>Child name</label><input id="newChildName" value="${esc(prefill.childName||'')}"></div>
      <div><label>Date of birth</label><input id="newChildDob" type="date"></div>
    </div>
    <div class="field-row">
      <div><label>Class</label><select id="newChildClass">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Enrollment date</label><input id="newChildEnroll" type="date" value="${todayStr()}"></div>
    </div>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0;">
    <div class="field-row">
      <div><label>Parent name</label><input id="newParentName" value="${esc(prefill.parentName||'')}"></div>
      <div><label>Relation</label><select id="newParentRelation"><option>Mother</option><option>Father</option><option>Guardian</option></select></div>
    </div>
    <div class="field-row">
      <div><label>Phone (WhatsApp)</label><input id="newParentPhone" placeholder="+9477..." value="${esc(prefill.phone||'')}"></div>
      <div><label>Email</label><input id="newParentEmail" value="${esc(prefill.email||'')}"></div>
    </div>
    <div class="full-row"><label>Address</label><input id="newParentAddress"></div>
    <div class="full-row"><label>Notes</label><textarea id="newParentNotes" rows="2" placeholder="e.g. has a younger sibling, interested in future enrollment"></textarea></div>
    <div class="modal-actions">
      <button class="secondary" onclick="convertingProspectId=null; closeModal();">Cancel</button>
      <button onclick="saveNewChild()">Add record</button>
    </div>
  `);
}
async function saveNewChild(){
  const childName = document.getElementById('newChildName').value.trim();
  const parentName_ = document.getElementById('newParentName').value.trim();
  const phone = document.getElementById('newParentPhone').value.trim();
  if(!childName || !parentName_ || !phone){ alert('Child name, parent name, and phone are required.'); return; }
  const payload = {
    childName,
    dob: document.getElementById('newChildDob').value || todayStr(),
    classId: document.getElementById('newChildClass').value,
    enrollDate: document.getElementById('newChildEnroll').value || todayStr(),
    parentName: parentName_,
    relation: document.getElementById('newParentRelation').value,
    phone,
    email: document.getElementById('newParentEmail').value.trim(),
    address: document.getElementById('newParentAddress').value.trim(),
    notes: document.getElementById('newParentNotes').value.trim()
  };
  const finishingProspectId = convertingProspectId;
  convertingProspectId = null;
  closeModal();
  try{
    await apiPost('/api/children', payload);
    if(finishingProspectId){
      await setProspectStatus(finishingProspectId, 'enrolled');
    }
    goto('directory');
  }catch(e){}
}

function showModal(html){
  const el = document.createElement('div');
  el.className='modal-backdrop';
  el.id='modalRoot';
  el.innerHTML = `<div class="modal">${html}</div>`;
  el.addEventListener('click', (e)=>{ if(e.target.id==='modalRoot') closeModal(); });
  document.body.appendChild(el);
}
function closeModal(){
  const el = document.getElementById('modalRoot');
  if(el) el.remove();
}

// init
checkSession();
</script>
